name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in what you can — the more detail, the faster we can fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g. Running `cce index` hangs indefinitely on my monorepo."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "e.g. Indexing should complete and print a summary."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cce init` in a repo with >10k files
        2. Run `cce index`
        3. Wait — it never finishes
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any terminal output or stack traces here.
      render: shell

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14.4, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: cce-version
    attributes:
      label: CCE version
      description: Run `cce --version` to get this.
      placeholder: "e.g. 0.3.1"
